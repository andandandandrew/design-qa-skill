<!DOCTYPE html>
<html lang="en" data-theme="dark" data-surface="cool" data-shadows="default" data-density="comfortable">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design QA Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<!-- DesignOS foundation (vendored): tokens → base primitives → app styles. Order matters. -->
<link rel="stylesheet" href="./tokens.css">
<link rel="stylesheet" href="./base.css">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<!-- DesignOS App Frame: no top bar — actions live in the panes. Left = Screens
     navigation; center = dot-grid canvas + floating pin cluster; right =
     Comments | Steps tabs. Icons are the lucide glyphs DesignOS uses. -->
<div class="app" id="app">
  <div class="body">
    <!-- ░░ LEFT — Screens ░░ -->
    <aside class="sidebar" id="leftSidebar">
      <div class="brand-row">
        <span class="brand-mark" title="Design QA">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>
        </span>
      </div>
      <div class="file-header">
        <div class="file-name-row">
          <span class="file-name" id="sessionName">Design QA</span>
          <!-- app.mjs appends the session-switcher chevron (FileTrigger) here. -->
        </div>
        <div class="file-sub" id="sessionMeta"></div>
      </div>
      <div class="sidebar-search">
        <span class="search-well">
          <svg class="search-ic" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input class="search-input" id="screenSearch" type="text" placeholder="Search screens" autocomplete="off">
        </span>
      </div>
      <div class="section-header">
        <span class="eyebrow" id="sidebarMeta">Screens</span>
        <button class="icon-btn sm" id="addScreenBtn" title="Add screen" aria-label="Add screen" disabled>
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </button>
      </div>
      <div class="view-list" id="viewList"></div>
    </aside>

    <!-- ░░ CENTER — canvas ░░ -->
    <main class="canvas-pane">
      <div class="canvas dotgrid" id="canvas"></div>
      <!-- Floating QA-verb cluster — DesignOS bottom-toolbar idiom: icon-only
           28px tools with hover tooltip chips, active tool = accent fill. -->
      <div class="canvas-cluster" id="canvasCluster">
        <button class="cluster-tool" id="addPinBtn" aria-label="Comment">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="cluster-tip">Comment</span>
        </button>
        <button class="cluster-tool" id="drawBtn" aria-label="Draw">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          <span class="cluster-tip">Draw</span>
        </button>
      </div>
    </main>

    <!-- ░░ RIGHT — Comments | Steps ░░ -->
    <aside class="comments" id="rightPane">
      <div class="actions-row">
        <span class="presence" id="presence" title="You">
          <span class="presence-avatar" id="presenceAvatar">·</span>
          <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </span>
        <span class="actions-spacer"></span>
        <span class="live" id="liveBadge"><span class="dot"></span> live</span>
        <button class="btn primary share-btn" id="exportBtn" title="Share this session as a single file or zipped bundle" disabled>Share</button>
      </div>
      <div class="tabs" role="tablist">
        <button class="tab active" id="tabComments" role="tab" data-tab="comments">Comments</button>
        <button class="tab" id="tabSteps" role="tab" data-tab="steps">Steps</button>
      </div>
      <div class="comments-search-row" id="commentsSearchRow">
        <span class="search-well">
          <svg class="search-ic" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input class="search-input" id="commentSearch" type="text" placeholder="Search comments" autocomplete="off">
        </span>
        <button class="icon-btn" id="overflowBtn" title="Filters & sort" aria-haspopup="true" aria-expanded="false">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M7 12h10"/><path d="M10 18h4"/></svg>
        </button>
        <!-- Overflow popover hosts the status/category/sort controls (same IDs
             core.mjs wires) so the filtering logic is unchanged. -->
        <div class="overflow-menu" id="overflowMenu" hidden>
          <label class="overflow-row"><span>Status</span>
            <select class="select" id="filterStatus">
              <option value="all">All statuses</option>
              <option value="open">Open</option>
              <option value="resolved">Resolved</option>
            </select>
          </label>
          <label class="overflow-row"><span>Category</span>
            <select class="select" id="filterCategory"><option value="all">All categories</option></select>
          </label>
          <label class="overflow-row"><span>Sort</span>
            <select class="select" id="sortBy">
              <option value="created">Created</option>
              <option value="status">Status</option>
              <option value="category">Category</option>
            </select>
          </label>
        </div>
      </div>
      <div class="comments-list" id="commentsList"></div>
    </aside>
  </div>
</div>
<script type="module" src="./app.mjs"></script>
</body>
</html>
